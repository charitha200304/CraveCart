spring.application.name=CraveCart

# Cloud DB URL with SSL (TiDB Cloud Configuration)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:4000/cravecart_db?sslMode=VERIFY_IDENTITY}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Ijse@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Google OAuth2 Settings
spring.security.oauth2.client.registration.google.client-id=362647837017-df092r8ei7ubq82dq4icgg416d7css2p.apps.googleusercontent.com
