spring.security.oauth2.client.registration.google.scope=profile,email

# Email Settings (Spring Mail SMTP)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:465}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.ssl.enable=${SMTP_SSL:true}
FRONTEND_URL=https://crave-cart-delta.vercel.app

# File & Request Size Limits (for Base64 Images)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
