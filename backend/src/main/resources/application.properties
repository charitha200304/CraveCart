spring.security.oauth2.client.registration.google.scope=profile,email

# Mailjet Email API Settings
mailjet.api.key=${MAILJET_API_KEY:}
mailjet.secret.key=${MAILJET_SECRET_KEY:}
mailjet.sender.email=${MAILJET_SENDER_EMAIL:cravecart.app@gmail.com}
mailjet.sender.name=${MAILJET_SENDER_NAME:CraveCart}
