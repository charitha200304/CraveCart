spring.application.name=CraveCart

# Cloud DB URL with SSL (TiDB Cloud Configuration)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:4000/cravecart_db?sslMode=VERIFY_IDENTITY}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Ijse@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Google OAuth2 Settings
spring.security.oauth2.client.registration.google.client-id=362647837017-df092r8ei7ubq82dq4icgg416d7css2p.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=profile,email

# -------------------------------------------------
# Gmail SMTP (Google Mail) Settings
# -------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Frontend URL (used for verification links)
FRONTEND_URL=https://crave-cart-delta.vercel.app

# File & Request Size Limits (for Base64 Images)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=50MB

# Handle Render Proxy (Fixes Google Redirect HTTPS issues)
server.port=8081